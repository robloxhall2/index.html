<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roblox Music Events</title>
    <style>
        body, html {
            background-color: #000;
            color: #fff;
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Times New Roman', serif;
            overflow-x: hidden;
        }

        /* ДВИЖУЩИЙСЯ ФОН */
        .bg-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .bg-scroll {
            display: flex;
            flex-wrap: wrap;
            width: 300%; /* Увеличили площадь для движения */
            height: 300%;
            position: absolute;
            top: -100%; left: -100%;
            transform: rotate(-15deg);
            /* Анимация: 40 секунд, бесконечно */
            animation: moveAround 40s linear infinite;
        }

        .bg-text {
            font-size: 3.5rem; /* Сделал крупнее */
            font-weight: 900;
            color: rgba(255, 255, 255, 0.18); /* Сделал еще ярче */
            text-transform: uppercase;
            padding: 40px;
            white-space: nowrap;
        }

        @keyframes moveAround {
            0% { transform: rotate(-15deg) translate(0, 0); }
            100% { transform: rotate(-15deg) translate(10%, 10%); }
        }

        /* КОНТЕНТ */
        .container {
            position: relative;
            z-index: 10;
            height: 350vh; /* Высота для скролла */
        }

        .section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        h1 { font-size: 2rem; letter-spacing: 5px; text-transform: uppercase; margin: 0 20px; }
        .author { font-size: 0.9rem; color: #aaa; margin-top: 15px; letter-spacing: 3px; }
        
        .rme-logo { font-size: 6rem; font-weight: bold; letter-spacing: 15px; margin-bottom: 20px; }
        .btn { 
            border: 1px solid #fff; padding: 15px 40px; 
            color: #fff; text-decoration: none; text-transform: uppercase;
            letter-spacing: 3px; font-size: 0.8rem;
        }

        .qr-box {
            width: 260px; height: 260px;
            background: #111; border: 1px solid #333;
            display: flex; align-items: center; justify-content: center;
        }
        .qr-img {
            width: 90%; height: 90%;
            background: #fff;
            -webkit-mask: url('image_2.png') center/contain no-repeat;
            mask: url('image_2.png') center/contain no-repeat;
        }

        footer {
            height: 20vh; display: flex; align-items: center; justify-content: center;
            font-weight: bold; letter-spacing: 5px; color: #fff;
        }

        /* КНОПКА МУЗЫКИ */
        .m-btn {
            position: fixed; top: 20px; left: 20px; z-index: 100;
            background: rgba(255,255,255,0.1); border: 1px solid #fff;
            color: #fff; padding: 10px; font-size: 0.7rem; cursor: pointer;
        }
    </style>
</head>
<body>

    <button class="m-btn" onclick="playMusic()" id="m-status">MUSIC: OFF</button>
    <audio id="track" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <div class="bg-layer">
        <div class="bg-scroll">
            <div class="bg-text">Erly life crisis</div><div class="bg-text">Erly life crisis</div>
            <div class="bg-text">Erly life crisis</div><div class="bg-text">Erly life crisis</div>
            <div class="bg-text">Erly life crisis</div><div class="bg-text">Erly life crisis</div>
            <div class="bg-text">Erly life crisis</div><div class="bg-text">Erly life crisis</div>
            <div class="bg-text">Erly life crisis</div><div class="bg-text">Erly life crisis</div>
            <div class="bg-text">Erly life crisis</div><div class="bg-text">Erly life crisis</div>
        </div>
    </div>

    <div class="container">
        <div class="section">
            <h1>Roblox Music Events</h1>
            <p class="author">By pr2rokl</p>
        </div>

        <div class="section">
            <div class="rme-logo">RME</div>
            <a href="https://t.me/robloxhall2" class="btn">Telegram</a>
        </div>

        <div class="section">
            <div class="qr-box"><div class="qr-img"></div></div>
            <p style="margin-top:20px; letter-spacing:3px; color:#888;">SCAN FOR ACCESS</p>
        </div>

        <footer>2026 ROBLOX MUSIC EVENTS</footer>
    </div>

    <script>
        function playMusic() {
            var m = document.getElementById("track");
            var s = document.getElementById("m-status");
            if (m.paused) { m.play(); s.innerHTML = "MUSIC: ON"; }
            else { m.pause(); s.innerHTML = "MUSIC: OFF"; }
        }
    </script>
</body>
</html>
