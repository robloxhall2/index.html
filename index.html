<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roblox Music Events</title>
    <style>
        html, body {
            background-color: #000;
            color: #fff;
            font-family: 'Times New Roman', Times, serif;
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow-x: hidden;
        }

        body { height: 320vh; position: relative; }

        /* ФОНОВЫЙ ПАТТЕРН — СДЕЛАЛ ЕЩЕ ЯРЧЕ (0.15) */
        .bg-pattern {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1; pointer-events: none; overflow: hidden;
        }
        .bg-grid {
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            display: flex; flex-wrap: wrap; align-content: space-around; justify-content: space-around;
            transform: rotate(-15deg);
            animation: diagonalMove 100s linear infinite;
        }
        .bg-item {
            font-size: 2.8rem; font-weight: 900;
            color: rgba(255, 255, 255, 0.15); /* ЯРКОСТЬ 15% — ТЕПЕРЬ ТОЧНО ВИДНО */
            text-transform: uppercase; letter-spacing: 5px; margin: 25px 50px;
        }
        @keyframes diagonalMove {
            from { transform: rotate(-15deg) translate(0, 0); }
            to { transform: rotate(-15deg) translate(-10%, -10%); }
        }

        /* МУЗЫКА */
        .music-player {
            position: fixed; top: 20px; left: 20px; z-index: 100;
            background: rgba(255,255,255,0.1); padding: 10px 15px;
            border: 1px solid rgba(255,255,255,0.3); border-radius: 5px;
        }
        .play-btn { cursor: pointer; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; font-family: monospace; }

        /* Декор */
        .decor-line {
            position: absolute; left: 50%; transform: translateX(-50%);
            width: 1px; height: 120px;
            background: rgba(255,255,255,0.2);
            z-index: 2;
        }

        /* Секции */
        .section {
            height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative; z-index: 3; text-align: center; padding: 0 20px;
        }

        h1 { font-size: 1.8rem; text-transform: uppercase; letter-spacing: 6px; line-height: 1.3; margin: 0; }
        .author { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 4px; margin-top: 20px; font-family: monospace; }
        
        .rme-title { font-size: 5rem; letter-spacing: 20px; font-weight: bold; margin-bottom: 30px; }
        .tg-link { 
            color: #fff; text-decoration: none; border: 1px solid #fff; 
            padding: 15px 40px; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 4px;
        }

        .qr-container {
            width: 250px; height: 250px; padding: 15px;
            background: #111; border: 1px solid #333;
        }
        .qr-mask {
            width: 100%; height: 100%; background: #fff;
            -webkit-mask: url('image_2.png') center/contain no-repeat;
            mask: url('image_2.png') center/contain no-repeat;
        }

        /* ФУТЕР — ЯРКИЙ И ЧИТАЕМЫЙ */
        footer {
            height: 15vh; display: flex; align-items: center; justify-content: center;
            font-family: monospace; font-size: 0.9rem; 
            color: #fff; /* ЧИСТО БЕЛЫЙ ЦВЕТ */
            letter-spacing: 8px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="music-player">
        <div id="status" class="play-btn" onclick="playM()">Music: OFF</div>
        <audio id="m" loop><source src="music.mp3" type="audio/mpeg"></audio>
    </div>

    <div class="bg-pattern">
        <div class="bg-grid">
            <div class="bg-item">Erly life crisis</div><div class="bg-item">Erly life crisis</div>
            <div class="bg-item">Erly life crisis</div><div class="bg-item">Erly life crisis</div>
            <div class="bg-item">Erly life crisis</div><div class="bg-item">Erly life crisis</div>
            <div class="bg-item">Erly life crisis</div><div class="bg-item">Erly life crisis</div>
        </div>
    </div>

    <div class="section">
        <h1>Этот сайт создан<br>Roblox Music Events!</h1>
        <p class="author">Production by pr2rokl</p>
        <div class="decor-line" style="bottom: -60px;"></div>
    </div>

    <div class="section">
        <div class="rme-title">RME</div>
        <a href="https://t.me/robloxhall2" class="tg-link">Telegram</a>
        <div class="decor-line" style="bottom: -60px;"></div>
    </div>

    <div class="section">
        <div class="qr-container"><div class="qr-mask"></div></div>
        <p style="font-family:monospace; color:#888; letter-spacing:3px; margin-top:20px;">SCAN FOR ACCESS</p>
    </div>

    <footer>2026 ROBLOX MUSIC EVENTS</footer>

    <script>
        function playM() {
            var a = document.getElementById("m");
            var b = document.getElementById("status");
            if (a.paused) { a.play(); b.innerHTML = "Music: ON"; } 
            else { a.pause(); b.innerHTML = "Music: OFF"; }
        }
    </script>
</body>
</html>
