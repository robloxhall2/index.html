<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RME | Roblox Music Events</title>
    <style>
        :root {
            --accent: #fff;
            --bg: #000;
            --font-mono: 'Courier New', monospace;
        }

        body, html {
            background-color: var(--bg);
            color: var(--accent);
            margin: 0; padding: 0;
            width: 100%; min-height: 100%;
            font-family: 'Times New Roman', serif;
            overflow-x: hidden;
        }

        /* --- ФОНОВЫЙ ТЕКСТ (Адаптивный) --- */
        .bg-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            opacity: 0.15;
        }

        .bg-text {
            /* font-size подстраивается под ширину экрана */
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 900;
            text-transform: uppercase;
            color: transparent; 
            -webkit-text-stroke: 1px var(--accent);
            white-space: nowrap;
            transform: rotate(-12deg);
            animation: pulse 5s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: rotate(-12deg) scale(1); }
            50% { opacity: 0.8; transform: rotate(-10deg) scale(1.05); }
        }

        /* --- КНОПКА МУЗЫКИ --- */
        .m-btn {
            position: fixed; top: 20px; left: 20px;
            z-index: 1001;
            background: var(--bg); border: 1px solid var(--accent);
            color: var(--accent); padding: 10px 15px;
            font-family: var(--font-mono); font-size: 12px;
            cursor: pointer;
        }

        /* --- МЕНЮ (Универсальное) --- */
        #menu-toggle { display: none; }
        .menu-btn {
            position: fixed; top: 20px; right: 20px;
            width: 45px; height: 45px;
            z-index: 1001; cursor: pointer;
            background: var(--bg); border: 1px solid var(--accent);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .menu-btn span { width: 25px; height: 1px; background: var(--accent); margin: 3px; transition: 0.3s; }

        .side-nav {
            position: fixed; top: 0; right: -100%;
            width: 100%; max-width: 350px; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 1000;
            transition: 0.5s; padding: 100px 40px;
            display: flex; flex-direction: column;
            border-left: 1px solid var(--accent);
            box-sizing: border-box;
        }

        #menu-toggle:checked ~ .side-nav { right: 0; }
        #menu-toggle:checked ~ .menu-btn span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        #menu-toggle:checked ~ .menu-btn span:nth-child(2) { opacity: 0; }
        #menu-toggle:checked ~ .menu-btn span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        .side-nav a {
            color: var(--accent); text-decoration: none;
            font-family: var(--font-mono); font-size: 1.2rem;
            margin-bottom: 25px; letter-spacing: 2px;
        }

        /* --- КОНТЕНТ --- */
        .container {
            position: relative; z-index: 10;
            width: 100%; max-width: 1200px;
            margin: 0 auto;
        }

        .section {
            min-height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box;
        }

        /* Терминал: на ПК шире, на телефоне на весь экран */
        .dev-terminal {
            border: 1px solid var(--accent);
            padding: 25px; width: 100%;
            max-width: 500px; background: rgba(0,0,0,0.8);
            text-align: left; position: relative;
        }

        h1 { 
            font-size: clamp(3.5rem, 18vw, 8rem); 
            margin: 0; letter-spacing: clamp(10px, 3vw, 25px); 
        }

        /* Сетка кнопок: 2 колонки на ПК, 1 на телефоне */
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px; width: 100%; max-width: 500px;
            margin-top: 30px;
        }

        .btn {
            border: 1px solid var(--accent); padding: 18px;
            color: var(--accent); text-decoration: none;
            font-family: var(--font-mono); font-size: 0.8rem;
            text-align: center; transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:hover { background: var(--accent); color: var(--bg); }

        /* --- MEDIA QUERIES (Адаптация) --- */
        @media (max-width: 600px) {
            .btn-grid {
                grid-template-columns: 1fr; /* Одна колонка на мобильных */
            }
            .btn-full { grid-column: auto; }
            
            .dev-terminal {
                padding: 15px;
            }

            .m-btn {
                padding: 8px 10px;
                font-size: 10px;
            }
        }

        /* Для очень больших экранов */
        @media (min-width: 1200px) {
            .dev-terminal { max-width: 650px; }
        }
    </style>
</head>
<body>

    <button class="m-btn" onclick="playMusic()" id="m-status">[ AUDIO: OFF ]</button>
    <audio id="track" loop><source src="Nettspend_-_you_ready_(SkySound.cc) (1).mp3" type="audio/mpeg"></audio>

    <input type="checkbox" id="menu-toggle">
    <label for="menu-toggle" class="menu-btn"><span></span><span></span><span></span></label>
    
    <nav class="side-nav">
        <a href="https://t.me/robloxhall2" onclick="closeMenu()">RME CHANNEL</a>
        <a href="https://t.me/pr2rokl" onclick="closeMenu()">ADMIN 1</a>
        <a href="https://t.me/Roretyu" onclick="closeMenu()">ADMIN 2</a>
    </nav>

    <div class="bg-layer">
        <div class="bg-text">Early life crisis</div>
        <div class="bg-text">RME STUDIO</div>
        <div class="bg-text">Early life crisis</div>
    </div>

    <div class="container">
        <div class="section">
            <div class="dev-terminal">
                <div style="font-family: var(--font-mono); border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; font-size: 0.8rem;">
                    > SYSTEM STATUS: ONLINE
                </div>
                <div style="font-family: var(--font-mono); font-size: 0.85rem; line-height: 1.6;">
                    [INFO] UNIT: ROBLOX MUSIC EVENTS<br>
                    [INFO] TYPE: VIRTUAL PRODUCTION<br>
                    [INFO] AREA: RU_REGION
                </div>
            </div>
        </div>

        <div class="section">
            <h1>RME</h1>
            <p style="font-family: var(--font-mono); letter-spacing: 5px; font-size: 0.7rem; color: #888;">// DIGITAL CONCERT EXPERIENCE</p>
            
            <div class="btn-grid">
                <a href="https://t.me/robloxhall2" class="btn">Telegram</a>
                <a href="https://t.me/pr2rokl" class="btn">Admin 1</a>
                <a href="https://t.me/Roretyu" class="btn" style="grid-column: 1 / -1;">Admin 2 // Roretyu</a>
            </div>
        </div>
    </div>

    <script>
        function playMusic() {
            var m = document.getElementById("track");
            var s = document.getElementById("m-status");
            if (m.paused) { m.play(); s.innerHTML = "[ AUDIO: ON ]"; }
            else { m.pause(); s.innerHTML = "[ AUDIO: OFF ]"; }
        }

        function closeMenu() {
            document.getElementById("menu-toggle").checked = false;
        }
    </script>
</body>
</html>
