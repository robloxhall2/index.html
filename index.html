<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RME | Roblox Music Events</title>
    <style>
        :root {
            --accent: #fff;
            --bg: #000;
            --font-mono: 'Courier New', monospace;
        }

        body, html {
            background-color: var(--bg);
            color: var(--accent);
            margin: 0; padding: 0;
            width: 100%; min-height: 100%;
            font-family: 'Times New Roman', serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent; /* Убирает синюю рамку при клике на мобилках */
        }

        /* --- АНИМАЦИЯ ПОЯВЛЕНИЯ --- */
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform, opacity; /* Оптимизация для мобильных процессоров */
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Последовательные задержки */
        .delay-1 { transition-delay: 0.1s; }
        .delay-2 { transition-delay: 0.2s; }
        .delay-3 { transition-delay: 0.3s; }

        /* --- ФОН --- */
        .bg-layer {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 1;
            pointer-events: none; display: flex;
            flex-direction: column; justify-content: space-around;
            align-items: center; opacity: 0.1;
        }

        .bg-text {
            font-size: clamp(1.5rem, 10vw, 5rem);
            font-weight: 900; text-transform: uppercase;
            color: transparent; -webkit-text-stroke: 1px var(--accent);
            white-space: nowrap; transform: rotate(-10deg);
        }

        /* --- UI ЭЛЕМЕНТЫ --- */
        .m-btn {
            position: fixed; top: 15px; left: 15px;
            z-index: 1001; background: var(--bg); border: 1px solid var(--accent);
            color: var(--accent); padding: 8px 12px;
            font-family: var(--font-mono); font-size: 10px; cursor: pointer;
        }

        .menu-btn {
            position: fixed; top: 15px; right: 15px;
            width: 40px; height: 40px; z-index: 1001;
            background: var(--bg); border: 1px solid var(--accent);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .menu-btn span { width: 20px; height: 1px; background: var(--accent); margin: 3px; }

        /* --- КОНТЕНТ --- */
        .container {
            position: relative; z-index: 10;
            width: 100%; padding: 0 15px; box-sizing: border-box;
        }

        .section {
            min-height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
        }

        .dev-terminal {
            border: 1px solid var(--accent); padding: 20px;
            width: 100%; max-width: 450px; background: rgba(0,0,0,0.85);
            text-align: left;
        }

        h1 { 
            font-size: clamp(3rem, 20vw, 7rem); margin: 10px 0;
            letter-spacing: clamp(5px, 4vw, 20px);
        }

        .btn-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 10px; width: 100%; max-width: 450px;
        }

        .btn {
            border: 1px solid var(--accent); padding: 15px 5px;
            color: var(--accent); text-decoration: none;
            font-family: var(--font-mono); font-size: 11px;
            text-transform: uppercase; transition: 0.3s;
        }

        /* Адаптация сетки кнопок для телефона */
        @media (max-width: 480px) {
            .btn-grid { grid-template-columns: 1fr; }
            .dev-terminal { padding: 15px; }
        }

        .btn:active { background: var(--accent); color: var(--bg); }
    </style>
</head>
<body>

    <button class="m-btn" onclick="playMusic()" id="m-status">[ AUDIO: OFF ]</button>
    <audio id="track" loop><source src="Nettspend_-_you_ready_(SkySound.cc) (1).mp3" type="audio/mpeg"></audio>

    <div class="bg-layer">
        <div class="bg-text">RME STUDIO</div>
        <div class="bg-text">VIRTUAL EVENTS</div>
        <div class="bg-text">RME STUDIO</div>
    </div>

    <div class="container">
        <div class="section">
            <div class="dev-terminal reveal">
                <div style="font-family: var(--font-mono); border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 12px; font-size: 0.7rem; color: #0f0;">
                    > SYSTEM_CONNECTED
                </div>
                <div style="font-family: var(--font-mono); font-size: 0.8rem; line-height: 1.5;">
                    [STATUS] ACTIVE<br>
                    [UNIT] ROBLOX_MUSIC_EVENTS<br>
                    [VER] 2.0.4_STABLE
                </div>
            </div>
        </div>

        <div class="section">
            <h1 class="reveal">RME</h1>
            <p class="reveal delay-1" style="font-family: var(--font-mono); font-size: 10px; color: #888; margin-bottom: 25px; letter-spacing: 3px;">
                // DIGITAL PRODUCTION HOUSE
            </p>
            
            <div class="btn-grid reveal delay-2">
                <a href="https://t.me/robloxhall2" class="btn">Telegram</a>
                <a href="https://t.me/pr2rokl" class="btn">Admin 1</a>
                <a href="https://t.me/Roretyu" class="btn" style="grid-column: 1 / -1;">Admin 2 // Roretyu</a>
            </div>
        </div>
    </div>

    <script>
        function reveal() {
            const reveals = document.querySelectorAll(".reveal");
            const windowHeight = window.innerHeight;
            
            reveals.forEach(el => {
                const elementTop = el.getBoundingClientRect().top;
                // На мобильных срабатывает, когда элемент показался на 10%
                const revealPoint = 50; 
                
                if (elementTop < windowHeight - revealPoint) {
                    el.classList.add("active");
                }
            });
        }

        // Слушаем и скролл, и касания экрана
        window.addEventListener("scroll", reveal);
        window.addEventListener("touchmove", reveal);
        window.addEventListener("load", reveal);

        function playMusic() {
            var m = document.getElementById("track");
            var s = document.getElementById("m-status");
            if (m.paused) { m.play(); s.innerHTML = "[ AUDIO: ON ]"; }
            else { m.pause(); s.innerHTML = "[ AUDIO: OFF ]"; }
        }
    </script>
</body>
</html>
