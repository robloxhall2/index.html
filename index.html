<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RME | Digital Production</title>
    <style>
        :root {
            --white: #ffffff;
            --gray: #404040;
            --black: #000000;
            --font-mono: 'Space Mono', monospace;
        }

        body, html {
            background-color: var(--black);
            color: var(--white);
            margin: 0; padding: 0;
            width: 100%; min-height: 100%;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- ФОН --- */
        .bg-fixed {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; display: flex; flex-direction: column;
            justify-content: space-between; pointer-events: none;
            opacity: 0.08; 
        }
        .bg-row {
            display: flex; white-space: nowrap; font-size: 10vh;
            font-weight: 900; line-height: 0.8; text-transform: uppercase;
        }
        .bg-row:nth-child(even) { transform: translateX(-15%); color: transparent; -webkit-text-stroke: 1px var(--white); }

        .container { position: relative; z-index: 10; width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 15px; box-sizing: border-box; }
        .section { min-height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; padding: 40px 0; }

        .reveal { opacity: 0; transform: translateY(20px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* --- ТЕХНИЧЕСКИЕ РАЗДЕЛИТЕЛИ --- */
        .ui-divider {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin: 20px 0;
        }
        .line {
            width: 1px;
            height: clamp(80px, 15vh, 200px);
            background: linear-gradient(to bottom, var(--white), transparent);
            position: relative;
        }
        /* Зеркальная линия (снизу вверх) */
        .line.bottom {
            background: linear-gradient(to top, var(--white), transparent);
        }

        .line::after {
            content: attr(data-label);
            position: absolute;
            left: 15px; top: 50%;
            transform: translateY(-50%);
            font-family: var(--font-mono);
            font-size: 8px;
            letter-spacing: 2px;
            color: var(--gray);
            white-space: nowrap;
        }

        /* --- ТЕРМИНАЛ --- */
        .dev-terminal {
            border: 1px solid var(--white);
            padding: 25px;
            width: 100%;
            max-width: 420px;
            background: var(--black);
            text-align: left;
        }

        /* --- ЕВЕНТ --- */
        .event-wrapper {
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--white);
            background: var(--black);
            cursor: pointer;
            overflow: hidden;
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .event-placeholder { padding: 80px 20px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 4px; }
        .event-content { display: none; opacity: 0; }
        .event-wrapper.opened .event-placeholder { display: none; }
        .event-wrapper.opened .event-content { display: block; opacity: 1; }
        .main-poster { width: 100%; height: auto; display: block; filter: grayscale(1); }

        /* --- UI НИЗ --- */
        h1 { font-size: clamp(5rem, 22vw, 11rem); font-weight: 900; margin: 0; letter-spacing: -6px; }
        .btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 100%; max-width: 550px; margin-top: 20px; }
        .btn { border: 1px solid var(--white); padding: 20px; color: var(--white); text-decoration: none; font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; text-align: center; transition: 0.3s; }
        .btn:hover { background: var(--white); color: var(--black); }

        .m-btn {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            background: var(--black); border: 1px solid var(--white);
            color: var(--white); padding: 10px 15px; font-family: var(--font-mono); font-size: 10px; cursor: pointer;
        }

        @media (max-width: 600px) {
            .btn-grid { grid-template-columns: 1fr; }
            .line::after { display: none; }
            .section { min-height: 70vh; }
        }
    </style>
</head>
<body>

    <div class="bg-fixed">
        <div class="bg-row">Early life crisis Early life crisis</div>
        <div class="bg-row">Early life crisis Early life crisis</div>
        <div class="bg-row">Early life crisis Early life crisis</div>
    </div>

    <button class="m-btn" onclick="playMusic()" id="m-status">AUDIO // OFF</button>
    <audio id="track" loop><source src="Nettspend_-_you_ready_(SkySound.cc) (1).mp3" type="audio/mpeg"></audio>

    <div class="container">
        
        <div class="section">
            <div class="dev-terminal reveal">
                <div style="font-family: var(--font-mono); font-size: 9px; border-bottom: 1px solid #222; padding-bottom: 8px; margin-bottom: 12px; display: flex; justify-content: space-between;">
                    <span>> RME_CORE_SYSTEM</span>
                    <span id="header-clock">00:00</span>
                </div>
                <div style="font-family: var(--font-mono); font-size: 12px; line-height: 1.5;">
                    STATUS: ONLINE<br>
                    TARGET: NETTSPEND_319<br>
                    LOCATION: ROBLOX_VIRTUAL
                </div>
            </div>

            <div class="ui-divider reveal">
                <div class="line" data-label="DATA_LINK_START"></div>
            </div>

            <div class="event-wrapper reveal" id="eventBox" onclick="openEvent()">
                <div class="event-placeholder">
                    <span>[ DECRYPT_FILE ]</span>
                </div>
                <div class="event-content">
                    <img src="IMG_20260316_175210_319.jpg" alt="Poster" class="main-poster">
                    <div style="padding: 15px; text-align: left; border-top: 1px solid #fff; background: #000;">
                        <p style="font-family: var(--font-mono); font-size: 12px; margin: 0;">NETTSPEND // EARLY LIFE CRISIS</p>
                    </div>
                </div>
            </div>

            <div class="ui-divider reveal">
                <div class="line bottom" data-label="TERMINAL_END_LINK"></div>
            </div>
        </div>

        <div class="section">
            <h1 class="reveal">RME</h1>
            <div class="btn-grid reveal">
                <a href="https://t.me/robloxhall2" class="btn">Telegram</a>
                <a href="https://t.me/pr2rokl" class="btn">Admin 1</a>
                <a href="https://t.me/Roretyu" class="btn" style="grid-column: 1 / -1;">Admin 2 // Roretyu</a>
            </div>
        </div>
    </div>

    <script>
        function openEvent() { document.getElementById('eventBox').classList.add('opened'); }
        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            for (var i = 0; i < reveals.length; i++) {
                var windowHeight = window.innerHeight;
                var elementTop = reveals[i].getBoundingClientRect().top;
                if (elementTop < windowHeight - 50) { reveals[i].classList.add("active"); }
            }
        }
        function updateClock() {
            const now = new Date();
            document.getElementById('header-clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        }
        window.addEventListener("scroll", reveal);
        window.addEventListener("load", () => { reveal(); updateClock(); });
        setInterval(updateClock, 1000);

        function playMusic() {
            var m = document.getElementById("track");
            var s = document.getElementById("m-status");
            if (m.paused) { m.play(); s.innerHTML = "AUDIO // ON"; s.style.background = "#fff"; s.style.color = "#000"; }
            else { m.pause(); s.innerHTML = "AUDIO // OFF"; s.style.background = "#000"; s.style.color = "#fff"; }
        }
    </script>
</body>
</html>
