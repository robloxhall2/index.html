<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roblox Music Events</title>
    <style>
        body, html {
            background-color: #000;
            color: #fff;
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Times New Roman', serif;
            overflow-x: hidden;
        }

        /* ДВИЖУЩИЙСЯ ФОН */
        .bg-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .bg-scroll {
            display: flex;
            flex-wrap: wrap;
            width: 300%;
            height: 300%;
            position: absolute;
            top: -100%; left: -100%;
            transform: rotate(-15deg);
            animation: moveAround 60s linear infinite;
        }

        .bg-text {
            font-size: 3rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.12); /* Оптимальная яркость */
            text-transform: uppercase;
            padding: 40px;
            white-space: nowrap;
        }

        @keyframes moveAround {
            0% { transform: rotate(-15deg) translate(0, 0); }
            100% { transform: rotate(-15deg) translate(10%, 10%); }
        }

        /* ЭФФЕКТ ГЛИТЧА ДЛЯ ЗАГОЛОВКОВ */
        .glitch {
            position: relative;
            display: inline-block;
        }
        .glitch:hover::before {
            content: attr(data-text);
            position: absolute; left: -2px;
            text-shadow: 2px 0 #ff00c1;
            background: #000; overflow: hidden;
            animation: noise-1 0.2s infinite linear alternate-reverse;
        }
        .glitch:hover::after {
            content: attr(data-text);
            position: absolute; left: 2px;
            text-shadow: -2px 0 #00fff9;
            background: #000; overflow: hidden;
            animation: noise-2 0.3s infinite linear alternate-reverse;
        }
        @keyframes noise-1 { 0% { clip-path: inset(20% 0 50% 0); } 100% { clip-path: inset(40% 0 10% 0); } }
        @keyframes noise-2 { 0% { clip-path: inset(10% 0 80% 0); } 100% { clip-path: inset(50% 0 30% 0); } }

        /* КОНТЕНТ */
        .container { position: relative; z-index: 10; }

        .section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* ТЕХНИЧЕСКИЕ ДЕТАЛИ (заполнение пустоты) */
        .scanline {
            width: 80%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            margin: 20px 0;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        .system-status {
            font-family: monospace; font-size: 0.6rem;
            color: #444; text-transform: uppercase; letter-spacing: 2px;
            position: absolute; bottom: 20px;
        }

        .btn { 
            border: 1px solid #fff; padding: 12px 35px; 
            color: #fff; text-decoration: none; text-transform: uppercase;
            letter-spacing: 4px; font-size: 0.8rem; transition: 0.3s;
            background: transparent;
        }
        .btn:hover { background: #fff; color: #000; box-shadow: 0 0 20px #fff; }

        .qr-box {
            width: 240px; height: 240px;
            background: #050505; border: 1px solid #222;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .qr-img {
            width: 85%; height: 85%; background: #fff;
            -webkit-mask: url('image_2.png') center/contain no-repeat;
            mask: url('image_2.png') center/contain no-repeat;
        }

        /* МУЗЫКА */
        .m-btn {
            position: fixed; top: 20px; left: 20px; z-index: 100;
            background: rgba(0,0,0,0.8); border: 1px solid #fff;
            color: #fff; padding: 8px 15px; font-size: 0.6rem; 
            cursor: pointer; font-family: monospace;
        }

        footer {
            height: 20vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            letter-spacing: 8px; font-weight: bold; color: #fff;
        }
    </style>
</head>
<body>

    <button class="m-btn" onclick="playMusic()" id="m-status">[ AUDIO: OFF ]</button>
    <audio id="track" loop><source src="Nettspend_-_you_ready_(SkySound.cc) (1).mp3" type="audio/mpeg"></audio>

    <div class="bg-layer">
        <div class="bg-scroll">
            <div class="bg-text">Erly life crisis</div><div class="bg-text">Erly life crisis</div>
            <div class="bg-text">Erly life crisis</div><div class="bg-text">Erly life crisis</div>
            <div class="bg-text">Erly life crisis</div><div class="bg-text">Erly life crisis</div>
        </div>
    </div>

    <div class="container">
        <div class="section">
            <h1 class="glitch" data-text="ROBLOX MUSIC EVENTS">ROBLOX MUSIC EVENTS</h1>
            <div class="scanline"></div>
            <p style="color: #666; font-family: monospace; letter-spacing: 2px;">SECURED ACCESS // 2026</p>
            <div class="system-status">SYS_STATUS: ACTIVE | ENCRYPTION: ON</div>
        </div>

        <div class="section">
            <div style="font-size: 5rem; font-weight: bold; letter-spacing: 20px; margin-bottom: 20px;">RME</div>
            <a href="https://t.me/robloxhall2" class="btn">ENTER CHANNEL</a>
        </div>

        <div class="section">
            <div class="qr-box">
                <div class="qr-img"></div>
            </div>
            <p style="margin-top:25px; letter-spacing:5px; color:#444; font-family: monospace; font-size: 0.7rem;">DECRYPTING QR_CODE...</p>
        </div>

        <footer>
            <div>2026 ROBLOX MUSIC EVENTS</div>
            <div style="font-size: 0.5rem; letter-spacing: 2px; margin-top: 10px; opacity: 0.3;">DESIGNED BY PR2ROKL</div>
        </footer>
    </div>

    <script>
        function playMusic() {
            var m = document.getElementById("track");
            var s = document.getElementById("m-status");
            if (m.paused) { m.play(); s.innerHTML = "[ AUDIO: ON ]"; }
            else { m.pause(); s.innerHTML = "[ AUDIO: OFF ]"; }
        }
    </script>
</body>
</html>
